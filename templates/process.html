{% extends "base.html" %}
{% from "_macros.html" import output_card %}
{% block body %}
  <h1>Processed</h1>
  {% for b in blocks %}
    <h2 class="latin">{{ b.query }}</h2>
    <div class="grid">
      {% for rel, note in b.produced %}{{ output_card(rel, note) }}{% endfor %}
    </div>
  {% endfor %}
{% endblock %}
