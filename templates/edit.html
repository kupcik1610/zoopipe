{% extends "base.html" %}
{% block body %}
  <h1>Adjust <span class="muted">— {{ rel }}</span></h1>

  {% if saved %}<p class="ok note">Saved.</p>{% endif %}

  <div class="card">
    <div class="editor-pv-wrap">
      <img id="pv" class="editor-pv" src="/out/{{ rel }}?v={{ saved or 0 }}" alt="">
    </div>

    <form id="ef" method="post" action="/edit" onsubmit="return doSave(event)">
      <input type="hidden" name="img" value="{{ rel }}">
      <input type="hidden" name="flip" id="flip" value="">
      <div class="editor-controls">
        <label class="rotctl">Rotate <output id="deg">0</output>°
          <input type="range" name="rotate" id="rot" class="range"
                 min="-180" max="180" value="0" step="1">
        </label>
        <button type="button" id="mirrorBtn" class="ghost toggle" aria-pressed="false">⇋ Mirror</button>
      </div>
      <p class="muted small">The fish is always re-centred in the frame on save.</p>
      <div class="actions">
        <button type="submit">Save</button>
        <button type="button" class="ghost" onclick="history.back()">Cancel</button>
      </div>
    </form>
  </div>

  <script>
    (function () {
      var pv = document.getElementById('pv'), rot = document.getElementById('rot'),
          deg = document.getElementById('deg'), flip = document.getElementById('flip'),
          mb = document.getElementById('mirrorBtn');
      function apply() {
        deg.textContent = rot.value;
        // rotate first, then mirror -> matches the worker's rotate-then-flip
        pv.style.transform = (flip.value === '1' ? 'scaleX(-1) ' : '') + 'rotate(' + rot.value + 'deg)';
      }
      rot.addEventListener('input', apply);
      mb.addEventListener('click', function () {
        flip.value = flip.value === '1' ? '' : '1';
        var on = flip.value === '1';
        mb.classList.toggle('on', on);
        mb.setAttribute('aria-pressed', on ? 'true' : 'false');
        apply();
      });
      apply();
    })();
  </script>
{% endblock %}
